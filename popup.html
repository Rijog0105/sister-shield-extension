<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SHELTER</title>
  <style>
    body {
      margin: 0;
      width: 360px;
      min-height: 560px;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 12px;
    }

    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 900;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .panic {
      background: linear-gradient(90deg, #ef4444, #dc2626);
      color: white;
    }

    .emergency {
      background: linear-gradient(90deg, #f59e0b, #d97706);
      color: white;
    }

    .reset {
      background: linear-gradient(90deg, #334155, #1e293b);
      color: white;
    }

    #blockedList {
      max-height: 180px;
      overflow-y: auto;
    }

    .emptyText {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">🛡️ SISTER SHIELD </div>
    <div class="subtitle">Real-Time Browser Safety Extension</div>

    <div class="grid">
      <div class="stat">
        <div class="stat-label">STATUS</div>
        <div class="stat-value" id="statusText">ACTIVE</div>
      </div>

      <div class="stat">
        <div class="stat-label">RISK SCORE</div>
        <div class="stat-value" id="riskValue">0</div>
      </div>

      <div class="stat" style="grid-column: span 2;">
        <div class="stat-label">THREATS BLOCKED</div>
        <div class="stat-value" id="threatCount">0</div>
      </div>
    </div>
  </div>

  <div class="card">
    <button class="btn panic" id="panicBtn">🚨 Panic Mode</button>
    <button class="btn emergency" id="emergencyBtn">🆘 Emergency Mode</button>
    <button class="btn reset" id="resetBtn">♻ Reset Demo State</button>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;">Blocked Threats</div>
    <div id="blockedList">
      <div class="emptyText">No blocked threats yet</div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;">Emergency Activity</div>
    <div id="panicInfo">
      <div class="emptyText">No emergency events yet</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

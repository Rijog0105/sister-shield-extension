<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sister Shield</title>
  <style>
    body {
      margin: 0;
      width: 360px;
      min-height: 560px;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 12px;
    }

    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 900;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .panic {
      background: linear-gradient(90deg, #ef4444, #dc2626);
      color: white;
    }

    .emergency {
      background: linear-gradient(90deg, #f59e0b, #d97706);
      color: white;
    }

    .reset {
      background: linear-gradient(90deg, #334155, #1e293b);
      color: white;
    }

    #blockedList {
      max-height: 180px;
      overflow-y: auto;
    }

    .emptyText {
      font-size: 12px;
      color: #94a3b8;
    }

    /* AI Verdict styles */
    .ai-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .ai-badge.high {
      background: rgba(239,68,68,0.18);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .ai-badge.suspicious {
      background: rgba(245,158,11,0.18);
      border: 1px solid rgba(245,158,11,0.3);
      color: #fcd34d;
    }

    .ai-badge.safe {
      background: rgba(34,197,94,0.18);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }

    .ai-reason {
      font-size: 11px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-top: 4px;
    }

    .ai-advice {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #fdba74;
      background: rgba(249,115,22,0.08);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .ai-loading {
      font-size: 12px;
      color: #94a3b8;
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- Status Dashboard -->
  <div class="card">
    <div class="title">🛡️ Sister Shield</div>
    <div class="subtitle">Real-Time Browser Safety Extension</div>

    <div class="grid">
      <div class="stat">
        <div class="stat-label">STATUS</div>
        <div class="stat-value" id="statusText">ACTIVE</div>
      </div>

      <div class="stat">
        <div class="stat-label">RISK SCORE</div>
        <div class="stat-value" id="riskValue">0</div>
      </div>

      <div class="stat" style="grid-column: span 2;">
        <div class="stat-label">THREATS BLOCKED</div>
        <div class="stat-value" id="threatCount">0</div>
      </div>
    </div>
  </div>

  <!-- AI Verdict Card — powered by Chrome Cyber Safe proxy -->
  <div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;">
      🧠 AI Verdict
      <span style="font-size:10px;font-weight:500;color:#64748b;margin-left:6px;">via Chrome Cyber Safe</span>
    </div>
    <div id="aiVerdictBox">
      <div class="ai-loading">No AI analysis yet. Trigger a threat to see Gemini verdict.</div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="card">
    <button class="btn panic" id="panicBtn">🚨 Panic Mode</button>
    <button class="btn emergency" id="emergencyBtn">🆘 Emergency Mode</button>
    <button class="btn reset" id="resetBtn">♻ Reset Demo State</button>
  </div>

  <!-- Blocked Threats -->
  <div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;">Blocked Threats</div>
    <div id="blockedList">
      <div class="emptyText">No blocked threats yet</div>
    </div>
  </div>

  <!-- Emergency Activity -->
  <div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;">Emergency Activity</div>
    <div id="panicInfo">
      <div class="emptyText">No emergency events yet</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

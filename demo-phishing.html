<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank KYC Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ed, #fee2e2);
      color: #111827;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    .card {
      background: #ffffff;
      border: 1px solid #fecaca;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .warning {
      color: #991b1b;
      font-weight: 800;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .btn-link {
      display: inline-block;
      margin-top: 16px;
      background: #dc2626;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
    }
    .small {
      margin-top: 20px;
      font-size: 14px;
      color: #7f1d1d;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="warning">⚠ Urgent: Your Bank Account Will Be Suspended</div>

    <p>
      Dear customer, your KYC is pending and your UPI services will be blocked immediately
      unless you verify now.
    </p>

    <p>
      To avoid account suspension, complete secure login verification now.
    </p>

    <a class="btn-link" href="https://example.com/verify-now-kyc-update">
      Verify Now
    </a>

    <p class="small">
      Controlled phishing simulation for Sister Shield demo.
    </p>
  </div>
</body>
</html>
